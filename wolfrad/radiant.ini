; command mapping for QERadiant
;
; syntax is as follows
; Command name=keystroke
;
; use +alt, shift or ctrl to modify the keys (you can combine them)
; i.e.
; EntityColor=k+ctrl
;
; the special keys are as follows
;
; UP=Cursor up
; DOWN=Cursor down
; LEFT=Cursor left
; RIGHT=Cursor right
; SPACE=space
; BACKSPACE=back space
; ESCAPE=escape
; END=end
; INSERT=insert
; DELETE=delete
; PAGEUP=page up
; PAGEDOWN=page down
; TAB=tab
; RETURN=return (enter)
; F1..F2=f1 .. f12
; COMMAN=,
; PERIOD=.
; PLUS=+
; MULTIPLY=* 
; SUBTRACT=-
CubicClipping=0
CubicScale=16
WhichGame=Quake2
ALTEdgeDrag=1
UseTextureBar=0
FaceColors=0

[Commands]
EntityColor=K
CameraForward=UP
CameraBack=DOWN
CameraLeft=LEFT
CameraRight=RIGHT
CameraUp=D
CameraDown=C
CameraAngleUp=A
CameraAngleDown=Z
CameraStrafeRight=PERIOD
